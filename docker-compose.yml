version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: car24_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: car24
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d car24"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
