services: 
 postgres:
  image: postgres:16
  container_name: postgres
  restart: always
  environment: 
   POSTGRES_USER: admin
   POSTGRES_PASSWORD: admin
   POSTGRES_DB: car24
  ports:
   - "5432:5432"
  volumes: 
   - postgres_data:/var/lib/postgresql/data
 redis: 
  image: redis:7
  container_name: redis
  restart: always
  ports: 
  - "6379:6379"
#  backend:
#   build: .
#   ports:
#    - "3000:3000"
 minIo: 
  image: minio/minio:latest
  container_name: minIo
  ports: 
   - "9000:9000"
   - "9001:9001"
  environment: 
    MINIO_ROOT_USER: minioadmin
    MINIO_ROOT_PASSWORD: minioadmin123
  volumes: 
   - minio_data:/data
  command: server /data --console-address ":9001"
  restart: always
volumes: 
  postgres_data:
  minio_data: